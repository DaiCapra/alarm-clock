name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="build-${{ github.run_number }}-$SHORT_SHA"
          APK="alarm-clock-$TAG.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK"
          gh release create "$TAG" "$APK" \
            --prerelease \
            --title "Build ${{ github.run_number }} ($SHORT_SHA)" \
            --notes "Automated build from commit $SHORT_SHA."

      - name: Rotate old builds (keep 5)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # gh release list returns newest first
          gh release list --limit 100 --json tagName \
            --jq '[.[] | .tagName | select(startswith("build-"))] | .[5:] | .[]' |
          while read -r tag; do
            echo "Deleting old build: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
